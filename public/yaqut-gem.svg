<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="oval-clip">
      <ellipse cx="100" cy="100" rx="95" ry="80"/>
    </clipPath>
    <radialGradient id="center-glow" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#FFE4E1" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FF6B8A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#DC143C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#oval-clip)">
    <!-- Bottom facets -->
    <polygon points="20,130 55,105 40,170" fill="#CC1030" opacity="0.95"/>
    <polygon points="55,105 100,120 40,170" fill="#B80E28" opacity="0.9"/>
    <polygon points="100,120 145,105 160,170" fill="#A50C22" opacity="0.95"/>
    <polygon points="145,105 180,130 160,170" fill="#950A1C" opacity="0.9"/>
    <polygon points="40,170 100,120 160,170" fill="#850818" opacity="0.85"/>
    <!-- Middle facets -->
    <polygon points="20,130 55,105 50,55" fill="#E82050" opacity="0.9"/>
    <polygon points="55,105 100,80 50,55" fill="#DC1848" opacity="0.95"/>
    <polygon points="100,80 145,105 150,55" fill="#D01040" opacity="0.9"/>
    <polygon points="145,105 180,130 150,55" fill="#C40838" opacity="0.85"/>
    <!-- Top facets -->
    <polygon points="50,55 100,20 100,80" fill="#F03060" opacity="0.95"/>
    <polygon points="100,20 150,55 100,80" fill="#E42858" opacity="0.9"/>
    <polygon points="50,55 100,20 20,45" fill="#FF4070" opacity="0.85"/>
    <polygon points="150,55 100,20 180,45" fill="#D81848" opacity="0.8"/>
    <!-- Edge facets -->
    <polygon points="20,45 50,55 30,85" fill="#E83060" opacity="0.75"/>
    <polygon points="180,45 150,55 170,85" fill="#D01040" opacity="0.7"/>
    <polygon points="30,85 20,130 55,105" fill="#D82050" opacity="0.7"/>
    <polygon points="170,85 180,130 145,105" fill="#C00838" opacity="0.65"/>
    <!-- Center glow -->
    <ellipse cx="95" cy="80" rx="40" ry="30" fill="url(#center-glow)"/>
    <!-- Highlight -->
    <ellipse cx="88" cy="70" rx="18" ry="10" fill="white" opacity="0.12"/>
  </g>
  <!-- Border -->
  <ellipse cx="100" cy="100" rx="95" ry="80" fill="none" stroke="#DC143C" stroke-width="2" opacity="0.4"/>
</svg>
